name: Pipeline CI/CD Microservicios

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-and-push:
    runs-on: ubuntu-latest

    # Base de datos efímera para pruebas unitarias
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: rootpassword
          MYSQL_DATABASE: ecommerce_db
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -u root -prootpassword"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
    - name: Checkout del código
      uses: actions/checkout@v4

    - name: Configurar Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Ejecución de Pruebas
    - name: Ejecutar Pruebas Unitarias (Despachos)
      env:
        DB_ENDPOINT: localhost
        DB_PORT: 3306
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: rootpassword
      run: |
        cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        mvn clean test

    - name: Ejecutar Pruebas Unitarias (Ventas)
      env:
        DB_ENDPOINT: localhost
        DB_PORT: 3306
        SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/ecommerce_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
        SPRING_DATASOURCE_USERNAME: root
        SPRING_DATASOURCE_PASSWORD: rootpassword
      run: |
        cd back-Ventas_SpringBoot/Springboot-API-REST
        mvn clean test

    # Escaneo de Seguridad con SNYK
    - name: Configurar Snyk CLI
      uses: snyk/actions/setup@master

    - name: Escaneo Snyk - Back Despachos
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        cd back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        rm -f mvnw mvnw.cmd
        snyk test --severity-threshold=high || true

    - name: Escaneo Snyk - Back Ventas
      env:
        SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      run: |
        cd back-Ventas_SpringBoot/Springboot-API-REST
        rm -f mvnw mvnw.cmd
        snyk test --severity-threshold=high || true

    # Construcción y Despliegue (IE4)
    - name: Login en Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build y Push Back-Despachos
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-despachos:latest ./back-Despachos_SpringBoot/Springboot-API-REST-DESPACHO
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-despachos:latest

    - name: Build y Push Back-Ventas
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/api-ventas:latest ./back-Ventas_SpringBoot/Springboot-API-REST
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/api-ventas:latest

    - name: Build y Push Frontend
      run: |
        docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest ./front_despacho
        docker push ${{ secrets.DOCKERHUB_USERNAME }}/front-despacho:latest
